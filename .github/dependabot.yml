version: 2
registries:
  dockerhub:
    type: docker-registry
    url: https://registry.hub.docker.com
    username: "mozilla"
    password: ${{ secrets.DOCKER_HUB_MOZILLA_OAT }}
  githubcr:
    type: docker-registry
    url: https://ghcr.io
    username: x-access-token
    password: ${{ secrets.ADDONS_ROBOT_PUBLIC_REPOS_PAT }}
updates:
- package-ecosystem: "docker"
  registries:
    - dockerhub
    - githubcr
  directory: "/"
  schedule:
    interval: daily
  cooldown:
    default-days: 7
  open-pull-requests-limit: 99
- package-ecosystem: "docker-compose"
  registries:
    - dockerhub
    - githubcr
  directory: "/"
  schedule:
    interval: daily
  cooldown:
    default-days: 7
    exclude:
      - addons-frontend
  open-pull-requests-limit: 99
  ignore:
  - dependency-name: elasticsearch
    versions:
    - ">= 9"
  - dependency-name: rabbitmq
    versions:
    - ">= 4"
  - dependency-name: redis
    versions:
    - ">= 7"
  - dependency-name: mysql
    versions:
    - ">= 9"
  - dependency-name: memcached
    versions:
    - ">= 1.6"
  - dependency-name: addons-frontend
    versions:
    - "< 2026.01.08"
  - dependency-name: autograph
    versions:
    - "< 7"
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: daily
  cooldown:
    default-days: 7
  open-pull-requests-limit: 99
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 99
  cooldown:
    default-days: 7
    exclude:
      - addons-linter
- package-ecosystem: pip
  directory: "/"
  schedule:
    interval: daily
  groups:
      google:
        patterns:
          - "google-*"
      celery:
        patterns:
          - celery
          - billiard
          - kombu
  open-pull-requests-limit: 99
  cooldown:
    default-days: 7
  ignore:
  - dependency-name: django
    versions:
    - ">= 6"
  - dependency-name: billiard
    versions:
    - ">= 5"
  - dependency-name: celery
    versions:
    - ">= 6"
  - dependency-name: elasticsearch
    versions:
    - ">= 9"
  - dependency-name: elastic-transport
    versions:
    - ">= 9"
  - dependency-name: kombu
    versions:
    - ">= 6"
  - dependency-name: vine
    versions:
    - ">= 6"
  - dependency-name: idna
    versions:
    - ">= 4"
  - dependency-name: amqp
    versions:
    - ">= 6"
  - dependency-name: click
    versions:
    - ">= 9"
  - dependency-name: protobuf
    versions:
    - ">= 7.0.0"
